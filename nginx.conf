server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The app never navigates to a nested path (all routing is via query
  # params on `/`), but this fallback is a harmless safety net.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
